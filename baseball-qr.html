<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Word Baseball · 흑백 포스터 (A4)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Bagel+Fat+One&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
  :root {
    --ink: #000;
    --paper: #fff;
    --gray: #e6e6e6;
    --display: "Jua", system-ui, sans-serif;
    --num: "Bagel Fat One", "Jua", sans-serif;
    --en: "Fredoka", "Jua", sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--display);
    background: #cfcfcf;
    color: var(--ink);
    min-height: 100dvh;
    padding: 16px;
    display: grid;
    place-items: start center;
  }

  .poster {
    width: 210mm;
    height: 297mm;
    background: var(--paper);
    color: var(--ink);
    padding: 14mm 14mm 10mm;
    display: grid;
    grid-template-rows: auto auto auto 1fr auto auto;
    gap: 5mm;
    position: relative;
    overflow: hidden;
    border: 2px solid var(--ink);
  }
  .poster::before,
  .poster::after {
    content: "";
    position: absolute;
    width: 16mm; height: 16mm;
    border: 3mm solid var(--ink);
  }
  .poster::before {
    top: 4mm; left: 4mm;
    border-right: 0; border-bottom: 0;
  }
  .poster::after {
    bottom: 4mm; right: 4mm;
    border-left: 0; border-top: 0;
  }
  .poster > * { position: relative; z-index: 1; }

  /* ── 헤더 ── */
  .head { text-align: center; padding-top: 2mm; }
  .title {
    font-family: var(--num);
    font-size: 42pt;
    letter-spacing: 0.02em;
    line-height: 1;
    margin: 0;
  }
  .title .amp { font-family: var(--en); font-weight: 700; }
  .subtitle {
    margin: 2mm 0 0;
    font-family: var(--en);
    font-size: 14pt;
    font-weight: 700;
    letter-spacing: 0.15em;
  }
  .tagline {
    margin: 3mm 0 0;
    font-family: var(--display);
    font-size: 20pt;
    letter-spacing: 0.02em;
  }

  /* ── 홈런 아이콘 행 ── */
  .icons-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6mm;
  }
  .icons-row svg { display: block; }
  .ball-lg { width: 34mm; height: 34mm; }
  .bat { width: 46mm; height: 16mm; transform: rotate(-12deg); }

  /* ── 점수표 ── */
  .score-box {
    border: 3pt solid var(--ink);
    box-shadow: 2mm 2mm 0 var(--ink);
    background: var(--paper);
    padding: 4mm 5mm;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2mm;
    margin: 0 4mm;
  }
  .score-cell { text-align: center; padding: 1mm; }
  .score-cell .t {
    font-family: var(--num);
    font-size: 20pt;
    line-height: 1;
    display: block;
  }
  .score-cell .b {
    font-family: var(--display);
    font-size: 11pt;
    display: block;
    margin-top: 1.5mm;
  }
  .score-cell.hr { background: var(--ink); color: var(--paper); border-radius: 2mm; }

  /* ── QR 카드 ── */
  .qr-card {
    background: var(--paper);
    border: 3pt solid var(--ink);
    box-shadow: 2mm 2mm 0 var(--ink);
    padding: 5mm;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 5mm;
    align-items: center;
    margin: 0 4mm;
  }
  #qr {
    width: 60mm; height: 60mm;
    display: grid; place-items: center;
    position: relative;
  }
  #qr svg, #qr canvas { width: 100%; height: 100%; display: block; }
  .qr-text { display: grid; gap: 2mm; }
  .qr-text .label {
    font-family: var(--display);
    font-size: 17pt; line-height: 1.25;
  }
  .qr-text .label b {
    font-family: var(--num);
    font-size: 22pt;
    font-weight: normal;
  }
  .qr-text .url {
    font-family: var(--en);
    font-size: 10pt;
    word-break: break-all;
    background: var(--gray);
    padding: 2mm 3mm;
    border-radius: 2mm;
  }

  /* ── 3단계 안내 ── */
  .steps {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4mm;
  }
  .step {
    background: var(--paper);
    border: 2pt solid var(--ink);
    padding: 3mm 2mm;
    text-align: center;
  }
  .step .num {
    font-family: var(--num);
    font-size: 28pt;
    line-height: 1;
    display: block;
    margin-bottom: 1.5mm;
  }
  .step .desc {
    font-family: var(--display);
    font-size: 14pt;
    line-height: 1.2;
  }

  /* ── 푸터 ── */
  .foot {
    text-align: center;
    font-family: var(--display);
    font-size: 12pt;
    padding: 2mm 0;
    border-top: 1.5pt solid var(--ink);
  }

  /* ── 도구 모음 ── */
  .toolbar {
    position: fixed;
    bottom: 16px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 8px;
    background: var(--ink); color: var(--paper);
    padding: 8px 12px;
    border-radius: 999px;
    box-shadow: 0 4px 16px rgba(0,0,0,.3);
    font-family: var(--display);
    font-size: 13px;
    z-index: 99;
  }
  .toolbar button {
    background: transparent; color: inherit;
    border: 0; padding: 6px 12px;
    border-radius: 999px;
    font-family: inherit; font-size: inherit;
    cursor: pointer;
  }
  .toolbar button:hover { background: rgba(255,255,255,.18); }
  .toolbar a { color: inherit; text-decoration: underline; padding: 6px 10px; }

  @page { size: A4 portrait; margin: 0; }
  @media print {
    body { background: white; padding: 0; }
    .poster { box-shadow: none; page-break-after: always; }
    .toolbar { display: none; }
    * { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
  }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <!-- 야구공 -->
    <symbol id="baseball" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="44" fill="#fff" stroke="#000" stroke-width="4"/>
      <path d="M18 32c10 6 10 30 0 36" stroke="#000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M82 32c-10 6-10 30 0 36" stroke="#000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- 실밥 -->
      <g stroke="#000" stroke-width="1.3" fill="none">
        <path d="M22 36l-3-2 M22 42l-3-2 M22 48l-3-2 M22 54l-3-2 M22 60l-3-2 M22 66l-3-2"/>
        <path d="M78 36l3-2 M78 42l3-2 M78 48l3-2 M78 54l3-2 M78 60l3-2 M78 66l3-2"/>
      </g>
      <!-- 단어 -->
      <text x="50" y="56" text-anchor="middle" font-family="Bagel Fat One, serif" font-size="18" fill="#000">WORD</text>
    </symbol>

    <!-- 야구 배트 -->
    <symbol id="bat" viewBox="0 0 200 70">
      <path d="M15 35 Q15 20 30 18 L160 25 Q180 30 185 35 Q180 40 160 45 L30 52 Q15 50 15 35 Z"
            fill="url(#wood)" stroke="#000" stroke-width="3"/>
      <!-- 손잡이 -->
      <rect x="15" y="28" width="30" height="14" fill="#000"/>
      <circle cx="15" cy="35" r="6" fill="#000"/>
      <!-- 우드 그레인 -->
      <path d="M60 32 Q100 30 170 32 M60 38 Q100 40 170 38" stroke="#000" stroke-width="0.8" fill="none" opacity="0.6"/>
    </symbol>

    <!-- 나무결 패턴 -->
    <pattern id="wood" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#fff"/>
      <path d="M0 2h4" stroke="#000" stroke-width="0.4"/>
    </pattern>

    <!-- 홈베이스 -->
    <symbol id="home-plate" viewBox="0 0 100 80">
      <path d="M10 10 h80 v40 l-40 20 l-40 -20 z" fill="#fff" stroke="#000" stroke-width="4"/>
    </symbol>
  </defs>
</svg>

<article class="poster" aria-label="Word Baseball 흑백 QR 포스터">

  <header class="head">
    <h1 class="title">⚾ WORD BASEBALL</h1>
    <p class="subtitle">ENGLISH · WORDS · GAME</p>
    <p class="tagline">영어단어 쳐서 홈런 치자!</p>
  </header>

  <div class="icons-row">
    <svg class="ball-lg" viewBox="0 0 100 100"><use href="#baseball"/></svg>
    <svg class="bat" viewBox="0 0 200 70"><use href="#bat"/></svg>
  </div>

  <div class="score-box">
    <div class="score-cell hr">
      <span class="t">4</span>
      <span class="b">홈런<br>1.2초</span>
    </div>
    <div class="score-cell">
      <span class="t">3</span>
      <span class="b">3루타<br>2.0초</span>
    </div>
    <div class="score-cell">
      <span class="t">2</span>
      <span class="b">2루타<br>3.0초</span>
    </div>
    <div class="score-cell">
      <span class="t">1</span>
      <span class="b">안타<br>5.0초</span>
    </div>
  </div>

  <div class="qr-card">
    <div id="qr" role="img" aria-label="Word Baseball 접속 QR 코드"></div>
    <div class="qr-text">
      <div class="label">스마트폰 카메라로<br><b>여기</b>를 찍어요</div>
      <div class="url" id="url-text"></div>
    </div>
  </div>

  <div class="steps">
    <div class="step"><span class="num">1</span><span class="desc">QR 찍기</span></div>
    <div class="step"><span class="num">2</span><span class="desc">뜻 맞히기</span></div>
    <div class="step"><span class="num">3</span><span class="desc">홈런!</span></div>
  </div>

  <footer class="foot">빠르게 맞히면 홈런 · 3이닝 단어 야구 · 와와 학원</footer>

</article>

<div class="toolbar">
  <button type="button" onclick="window.print()">🖨 A4 인쇄</button>
  <a href="./baseball.html">게임 열기</a>
  <button type="button" onclick="copyURL()">📋 URL 복사</button>
</div>

<script>
  const APP_URL = "https://sigongjoa.github.io/word-gacha-mockup/baseball.html";
  document.getElementById("url-text").textContent = APP_URL.replace(/^https:\/\//, "");

  function renderQR() {
    const container = document.getElementById("qr");
    try {
      const qr = qrcode(0, 'H');
      qr.addData(APP_URL);
      qr.make();
      const count = qr.getModuleCount();
      const cell = 10;
      const size = count * cell;
      let rects = "";
      for (let r = 0; r < count; r++) {
        for (let c = 0; c < count; c++) {
          if (qr.isDark(r, c)) {
            rects += `<rect x="${c * cell}" y="${r * cell}" width="${cell}" height="${cell}"/>`;
          }
        }
      }
      container.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${size} ${size}" shape-rendering="crispEdges" style="width:100%;height:100%;display:block;fill:#000">
          ${rects}
        </svg>`;
      // 가운데 야구공 오버레이
      container.style.position = "relative";
      const overlay = document.createElement("div");
      overlay.style.cssText = `
        position: absolute; inset: 0; margin: auto;
        width: 24%; height: 24%;
        background: #fff;
        border: 2.5pt solid #000;
        border-radius: 50%;
        display: grid; place-items: center;
        padding: 1mm;
      `;
      overlay.innerHTML = `<svg viewBox="0 0 100 100" style="width:100%;height:100%"><use href="#baseball"/></svg>`;
      container.appendChild(overlay);
    } catch (e) {
      console.error("QR render error", e);
      container.textContent = APP_URL;
    }
  }

  if (typeof qrcode === "function") renderQR();
  else window.addEventListener("load", () => {
    if (typeof qrcode === "function") renderQR();
    else document.getElementById("qr").textContent = APP_URL;
  });

  function copyURL() {
    navigator.clipboard.writeText(APP_URL).then(() => {
      alert("주소가 복사됐어요\n" + APP_URL);
    });
  }
</script>

</body>
</html>
